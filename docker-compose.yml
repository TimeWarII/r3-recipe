services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recipe
      POSTGRES_PASSWORD: recipe
      POSTGRES_DB: recipe_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe -d recipe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://recipe:recipe@db:5432/recipe_db
      SECRET_KEY: ${SECRET_KEY:-insecure-dev-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://recipe:recipe@db:5432/recipe_db
      SECRET_KEY: ${SECRET_KEY:-insecure-dev-secret-change-in-production}
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: